name: static-checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
      - 'agent/**'

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - name: Compile Python sources
        run: python3 -m compileall -q stackpilot tests hard_rq0

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - name: Check shell scripts
        run: |
          find scripts searchr1_stage2 hard_rq0 experiments -type f -name '*.sh' -print0 \
            | xargs -0 -n1 bash -n

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Fetch pinned Search-R1 test fixture
        run: |
          search_r1_commit=$(
            grep '^SEARCH_R1_COMMIT=' scripts/bootstrap_searchr1.sh \
              | grep -oE '[0-9a-f]{40}'
          )
          test -n "$search_r1_commit"
          mkdir -p upstream/Search-R1
          git -C upstream/Search-R1 init -q
          git -C upstream/Search-R1 remote add origin \
            https://github.com/PeterGriffinJin/Search-R1.git
          git -C upstream/Search-R1 fetch -q --depth=1 origin "$search_r1_commit"
          git -C upstream/Search-R1 checkout -q --detach FETCH_HEAD
          test "$(git -C upstream/Search-R1 rev-parse HEAD)" = "$search_r1_commit"
      - name: Install lightweight test dependencies
        run: python -m pip install --quiet fastapi httpx numpy openai pandas pydantic pytest pyyaml requests tqdm uvicorn
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
