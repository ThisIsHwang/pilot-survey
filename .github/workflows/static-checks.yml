name: static-checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Compile Python sources
        run: python3 -m compileall -q stackpilot tests

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Check shell scripts
        run: |
          find scripts searchr1_stage2 hard_rq0 -type f -name '*.sh' -print0 \
            | xargs -0 -n1 bash -n

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lightweight test dependencies
        run: python -m pip install --quiet numpy pandas pyyaml requests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
