name: static-checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - name: Compile Python sources
        run: python3 -m compileall -q stackpilot tests hard_rq0

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - name: Check shell scripts
        run: |
          find scripts searchr1_stage2 hard_rq0 experiments -type f -name '*.sh' -print0 \
            | xargs -0 -n1 bash -n

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch source quietly
        run: |
          git init -q .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch -q --depth=1 origin "$GITHUB_REF"
          git checkout -q FETCH_HEAD
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lightweight test dependencies
        run: python -m pip install --quiet fastapi httpx numpy openai pandas pydantic pyyaml requests tqdm
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
