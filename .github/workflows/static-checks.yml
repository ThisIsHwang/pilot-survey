name: static-checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  syntax-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install lightweight test dependencies
        run: python -m pip install --upgrade pip numpy pandas pyyaml requests
      - name: Python syntax
        run: python -m compileall -q stackpilot tests
      - name: Bash syntax
        run: |
          find scripts searchr1_stage2 hard_rq0 -type f -name '*.sh' -print0 \
            | xargs -0 -n1 bash -n
      - name: Unit tests
        run: python -m unittest discover -s tests -v
