seed: 42
work_dir: ./work/hard_rq0
search_r1_root: ./upstream/Search-R1

assets:
  root: ./work/hard_rq0/assets/wiki18
  corpus_path: ./work/hard_rq0/assets/wiki18/wiki-18.jsonl
  bm25_index_path: ./work/hard_rq0/assets/wiki18/bm25
  e5_index_path: ./work/hard_rq0/assets/wiki18/e5_Flat.index

retrieval:
  # top-k 10 is the easy control; 3 and 5 are the hard settings.
  topks: [3, 5, 10]
  bm25_port: 8101
  e5_port: 8102
  e5_model: intfloat/e5-base-v2
  e5_model_revision: f52bf8ec8c7124536f0efb74aca902b2995e5bcd

llm:
  model: Qwen/Qwen2.5-3B-Instruct
  api_base: http://127.0.0.1:9000/v1
  api_key: EMPTY
  temperature: 0.0
  max_tokens: 512

agent:
  max_search_turns: 4
  # Fixed total budget for the complete top-k bundle, matching Search-R1.
  observation_token_budget: 500

data:
  repo_id: RUC-NLPIR/FlashRAG_datasets
  revision: bcafb8dd07d453be3cbeeeb3f78be1841bddf92c
  datasets: [2wikimultihopqa, musique]
  train_examples_per_dataset: 5000
  # Drawn from the source train split after the 5,000 training rows. The
  # exhaustive validation patch scores the final incomplete batch as well.
  trainer_dev_examples_per_dataset: 500
  eval_examples_per_dataset: 500
  split_train: train
  split_eval: dev
  # Keep every pinned benchmark row. Corpus-missing gold titles remain in the
  # denominator and are reported explicitly instead of being filtered away.
  gold_title_corpus_policy: retain-and-report-all-gold

training:
  seeds: [13, 42, 87]
  train_gpus: "0,1,2,3,4,5,6"
  n_gpus: 7
  e5_gpu: 7
  topk: 3
  base_model: Qwen/Qwen2.5-3B-Instruct

report:
  bootstrap_samples: 10000
  specialization_threshold: 0.05
